# Gitleaks configuration for smart_refresher
# This file defines rules for secret scanning to prevent sensitive information from being committed.

[allowlist]
description = "Global allowlist"
paths = [
    "README.md",
    "CHANGELOG.md",
    "MIGRATING.md",
    "SECURITY.md",
    "ROADMAP.md",
    "example/README.md"
]

[rules]
[[rules]]
description = "Generic API Key"
regex = '''(?i)(?:key|api|token|secret|password|auth)[=:]\s*['"]([0-9a-zA-Z]{16,})['"]'''
entropy = 3.5
keywords = ["key", "api", "token", "secret", "password", "auth"]

[[rules]]
description = "GitHub Personal Access Token"
regex = '''ghp_[0-9a-zA-Z]{36}'''
keywords = ["ghp_"]

[[rules]]
description = "GitHub OAuth Access Token"
regex = '''gho_[0-9a-zA-Z]{36}'''
keywords = ["gho_"]

[[rules]]
description = "GitHub App Token"
regex = '''(ghu|ghs)_[0-9a-zA-Z]{36}'''
keywords = ["ghu_", "ghs_"]

[[rules]]
description = "GitHub Refresh Token"
regex = '''ghr_[0-9a-zA-Z]{76}'''
keywords = ["ghr_"]
