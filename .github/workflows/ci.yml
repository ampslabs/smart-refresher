name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flutter:
          - label: stable
            channel: stable
          - label: beta
            channel: beta
          # Update these pinned versions when new Flutter stable releases ship
          - label: stable-3.38.0
            channel: stable
            version: 3.38.0
          - label: stable-3.35.0
            channel: stable
            version: 3.35.0
    name: Verify (${{ matrix.flutter.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@f2c3f794d70f200b919579243c416020140565c9 # v2.18.0
        with:
          channel: ${{ matrix.flutter.channel }}
          flutter-version: ${{ matrix.flutter.version }}

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Clean environment for publish
        if: matrix.flutter.label == 'stable'
        run: |
          git checkout example/ios/Flutter/flutter_export_environment.sh || true
          git status

      - name: Package publish dry-run
        if: matrix.flutter.label == 'stable'
        run: dart pub publish --dry-run

      - name: SBOM generation dry-run
        if: matrix.flutter.label == 'stable'
        run: |
          dart pub global activate cyclonedx_dart
          dart pub global run cyclonedx_dart:make -o sbom.json
