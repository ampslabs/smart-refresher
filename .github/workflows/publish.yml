name: Publish to pub.dev

on:
  release:
    types: [created]

jobs:
  publish:
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@f2c3f794d70f200b919579243c416020140565c9 # v2.18.0
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate SBOM
        run: |
          dart pub global activate cyclonedx_dart
          dart pub global run cyclonedx_dart:make -o sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea23f01194697d8f3575913f5 # v4.4.3
        with:
          name: sbom
          path: sbom.json

      - name: Publish to pub.dev
        run: dart pub publish --force
