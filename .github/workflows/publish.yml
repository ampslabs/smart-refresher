name: Publish to pub.dev

on:
  release:
    types: [created]

jobs:
  publish:
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2 # v2.18.0
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate SBOM
        run: |
          dart pub global activate cyclonedx_dart
          dart pub global run cyclonedx_dart:make -o sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7.0.0
        with:
          name: sbom
          path: sbom.json

      - name: Publish to pub.dev
        run: dart pub publish --force
