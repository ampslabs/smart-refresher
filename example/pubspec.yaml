name: example
description: A new Flutter project.
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  flutter_riverpod: ^3.3.1
  iconify_sdk: ^0.2.0
  provider: ^6.1.5+1
  smart_refresher:
    path: ../
dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:

  assets:
    - images/animate.gif
    - images/empty.png
    - images/empty1.png
    - images/secondfloor.jpg
    - images/classical_follow.gif
    - images/classical_unfollow.gif
    - images/bezier.gif
    - images/warterdrop.gif
    - images/material_classic.gif
    - images/material_waterdrop.gif
    - images/qqbg.jpg
    - images/custom_1.jpg
    - images/gifindicator1.gif
    - images/msg_text_right_bg.9.png
    - images/custom_2.gif
    - images/loadstyle1.gif
    - images/loadstyle2.gif
    - images/loadstyle3.gif
    - images/refreshstyle1.gif
    - images/refreshstyle2.gif
    - images/refreshstyle3.gif
    - images/refreshstyle4.gif
